name: Build & Release

on:
  schedule:
    # 每天 UTC 0:00 检查 CyberChef 更新
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制构建（忽略版本检查）'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CYBERCHEF_REPO: gchq/CyberChef

jobs:
  # =========================================================================
  # Check: 检测 CyberChef 是否有新版本
  # =========================================================================
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.version_check.outputs.needs_build }}
      cyberchef_tag: ${{ steps.version_check.outputs.cyberchef_tag }}
      cyberchef_version: ${{ steps.version_check.outputs.cyberchef_version }}
    steps:
      - name: 获取 CyberChef 最新 release
        id: get_latest
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/$CYBERCHEF_REPO/releases/latest)
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          VERSION="${TAG#v}"
          echo "cyberchef_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "cyberchef_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CyberChef 最新版本: $TAG ($VERSION)"

      - name: 比较已发布版本
        id: version_check
        run: |
          CYBERCHEF_TAG="${{ steps.get_latest.outputs.cyberchef_tag }}"
          CYBERCHEF_VERSION="${{ steps.get_latest.outputs.cyberchef_version }}"

          # 获取本项目已有 release 的 tag
          EXISTING_TAG=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" \
            | jq -r '.[0].tag_name // "none"')

          echo "本仓库最新 release: $EXISTING_TAG"
          echo "CyberChef  tag:      $CYBERCHEF_TAG"

          FORCE="${{ github.event.inputs.force || 'false' }}"

          if [ "$FORCE" = "true" ] || [ "v$EXISTING_TAG" != "$CYBERCHEF_TAG" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo ">>> 需要构建"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo ">>> 无需构建（版本未变）"
          fi

          echo "cyberchef_tag=$CYBERCHEF_TAG" >> "$GITHUB_OUTPUT"
          echo "cyberchef_version=$CYBERCHEF_VERSION" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # Build: 三平台矩阵构建
  # =========================================================================
  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            bundle_ext: dmg
            setup_script: |
              echo "macOS 构建环境已就绪"
          - os: ubuntu-latest
            target: linux
            bundle_ext: AppImage
            setup_script: |
              echo "Linux Docker 构建"
          - os: windows-latest
            target: windows
            bundle_ext: msi
            setup_script: |
              echo "Windows 构建环境已就绪"

    env:
      CYBERCHEF_TAG: ${{ needs.check.outputs.cyberchef_tag }}
      CYBERCHEF_VERSION: ${{ needs.check.outputs.cyberchef_version }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Rust 工具链 (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux Tauri 构建依赖 (Docker)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 构建 Docker 镜像
          docker build -t cyberchef-portable .

      - name: 下载 CyberChef 并解压
        run: node scripts/download-cyberchef.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 注入版本号到 tauri.conf.json
        run: |
          VERSION="${{ env.CYBERCHEF_VERSION }}"
          # 使用 jq 更新版本号（macOS/Linux 自带，Windows 需安装）
          if command -v jq &> /dev/null; then
            TMP=$(mktemp)
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$TMP" && mv "$TMP" src-tauri/tauri.conf.json
            echo "版本号已更新为: $VERSION"
          else
            # Windows fallback: 使用 node
            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
              conf.version = '$VERSION';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
            "
            echo "版本号已更新为: $VERSION"
          fi
        shell: bash

      - name: 安装前端依赖
        run: npm install

      - name: 构建 (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tauri build --bundles dmg

      - name: 构建 (Linux / Docker)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 在 Docker 中构建
          docker run --rm \
            -v "$PWD:/app" \
            -v "$PWD/src-tauri/target:/app/src-tauri/target" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            cyberchef-portable \
            cargo tauri build --bundles appimage,deb

      - name: 构建 (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build --bundles msi

      - name: 收集产物位置
        id: collect
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          # 列出所有产物文件
          find "$BUNDLE_DIR" -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*.exe" \) > artifacts.txt || true
          # 也搜索可能在其他位置的 .dmg
          find src-tauri/target -maxdepth 3 -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" >> artifacts.txt || true
          echo "找到的产物:"
          cat artifacts.txt

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: cyberchef-${{ matrix.target }}-${{ env.CYBERCHEF_VERSION }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  # =========================================================================
  # Release: 创建 GitHub Release
  # =========================================================================
  release:
    needs: build
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CYBERCHEF_VERSION: ${{ needs.check.outputs.cyberchef_version }}
      CYBERCHEF_TAG: ${{ needs.check.outputs.cyberchef_tag }}

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: 整理产物
        run: |
          mkdir -p dist
          find artifacts -type f | while read f; do
            base=$(basename "$f")
            # 重命名为含版本号的格式
            cp "$f" "dist/CyberChefPortable-${CYBERCHEF_VERSION}-${base#cyberchef-}"
          done
          echo "发布产物:"
          ls -lh dist/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CYBERCHEF_VERSION }}
          name: CyberChef ${{ env.CYBERCHEF_TAG }} Portable
          body: |
            ## CyberChef ${{ env.CYBERCHEF_TAG }} Portable

            基于 [gchq/CyberChef ${{ env.CYBERCHEF_TAG }}](https://github.com/gchq/CyberChef/releases/tag/${{ env.CYBERCHEF_TAG }}) 构建的 Tauri 桌面应用。

            ### 下载
            - **macOS**: `CyberChefPortable-*.dmg`
            - **Linux**: `CyberChefPortable-*.AppImage` / `CyberChefPortable-*.deb`
            - **Windows**: `CyberChefPortable-*.msi`

            > macOS 用户首次打开如遇安全提示，请在「系统设置 → 隐私与安全性」中允许运行。
          draft: false
          prerelease: false
          files: dist/*
