name: Build & Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制构建'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # =========================================================================
  # Check: 检测 CyberChef 是否有新版本
  # =========================================================================
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: 版本检查
        id: check
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/gchq/CyberChef/releases/latest)
          CC_TAG=$(echo "$LATEST" | jq -r '.tag_name')
          CC_VER="${CC_TAG#v}"

          EXISTING=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" \
            | jq -r '.[0].tag_name // "none"')

          echo "CyberChef latest: $CC_TAG"
          echo "Our latest:      $EXISTING"
          echo "version=$CC_VER" >> "$GITHUB_OUTPUT"

          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [ "$FORCE" = "true" ] || [ "$EXISTING" != "$CC_VER" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  # =========================================================================
  # Build: 三平台矩阵
  # =========================================================================
  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Linux 系统依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装 npm 依赖
        run: npm install

      - name: 下载 CyberChef
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/download-cyberchef.js

      - name: 注入版本号
        shell: bash
        run: |
          VER="${{ needs.check.outputs.version }}"
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            c.version = '$VER';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2));
            console.log('version → ' + c.version);
          "
          # verify
          node -e "console.log(require('./src-tauri/tauri.conf.json').version)"

      - name: 构建 Tauri
        run: npx tauri build

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: cyberchef-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # =========================================================================
  # Release
  # =========================================================================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: 收集产物
        run: |
          mkdir -p dist
          find artifacts -type f | while read f; do
            cp "$f" "dist/$(basename "$f")"
          done
          ls -lh dist/

      - name: 创建 Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ needs.check.outputs.version }}
          git push -f origin ${{ needs.check.outputs.version }}

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: CyberChef ${{ needs.check.outputs.version }} Portable
          body: |
            CyberChef ${{ needs.check.outputs.version }} 桌面版

            基于 [gchq/CyberChef](https://github.com/gchq/CyberChef) 构建。

            | 平台 | 格式 |
            |------|------|
            | macOS | `.dmg` |
            | Linux | `.AppImage` / `.deb` |
            | Windows | `.msi` |

            > **macOS 用户**: 应用未经过 Apple 官方签名，首次打开时会提示「已损坏」或「无法验证开发者」。
            >
            > **解决方法（任选其一）**：
            > - 右键点击 `CyberChef.app` → 按住 Option 键 → 打开 → 确认
            > - 终端执行：`xattr -cr /Applications/CyberChef.app` 移除隔离属性
            > - 系统设置 → 隐私与安全性 → 仍要打开
          files: dist/*
